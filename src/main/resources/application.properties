spring.application.name=solaris-billing-api

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_billing_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

server.port=${PORT:8081}

application.portal.url=${BILLING_PORTAL_URL:http://localhost:8081}
application.email.resend-api-key=${RESEND_API_KEY:}
application.email.from=${EMAIL_FROM:no-reply@solarismanager.com}

application.billing.otp-expiration-minutes=${BILLING_OTP_EXPIRATION_MINUTES:10}
application.billing.otp-max-attempts=${BILLING_OTP_MAX_ATTEMPTS:5}
application.billing.session-expiration-minutes=${BILLING_SESSION_EXPIRATION_MINUTES:30}

application.billing.api-public-url=${API_PUBLIC_URL:https://solaris-billing-api.onrender.com}
application.billing.store-addon-price-ars=${BILLING_STORE_ADDON_PRICE_ARS:15000}
application.billing.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
application.billing.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
application.billing.mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
application.billing.mercadopago.use-sandbox=${MERCADOPAGO_USE_SANDBOX:false}
